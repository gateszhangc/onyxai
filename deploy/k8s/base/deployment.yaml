apiVersion: apps/v1
kind: Deployment
metadata:
  name: onyxai
  labels:
    app.kubernetes.io/name: onyxai
    app.kubernetes.io/part-of: onyxai
    dokploy-fleet/project: onyxai
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: onyxai
      app.kubernetes.io/part-of: onyxai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: onyxai
        app.kubernetes.io/part-of: onyxai
        dokploy-fleet/project: onyxai
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      imagePullSecrets:
        - name: dokploy-fleet-ghcr
      containers:
        - name: onyxai
          image: registry.144.91.77.245.sslip.io/dokploy-fleet-onyxai-onyxai:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 10
            tcpSocket:
              port: 3000
          livenessProbe:
            initialDelaySeconds: 20
            periodSeconds: 20
            tcpSocket:
              port: 3000
          startupProbe:
            failureThreshold: 30
            periodSeconds: 5
            tcpSocket:
              port: 3000
